<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skibidee Art Switch</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color-off: #1c1c1f;
            --bg-color-on: #fafafa;
            --text-color-off: #eaeaea;
            --text-color-on: #2d2d2d;
            
            /* Art Accent Colors */
            --art-accent: #ff4757; /* A modern red-pink */
            --art-accent-secondary: #fffa65; /* Neon yellow for effect */
            
            /* Switch Size */
            --switch-width: 160px;
            --switch-height: 280px;
            
            --transition-speed: 0.6s;
            --easing: cubic-bezier(0.68, -0.6, 0.32, 1.6); /* Playful bounce */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            transition: background-color var(--transition-speed) ease;
            overflow: hidden; /* Modern art often expands */
        }

        /* Ambient Background Elements for Off State */
        body.off { background-color: var(--bg-color-off); color: var(--text-color-off); }
        body.off::before {
            content: ''; position: absolute; top: -100px; right: -100px;
            width: 300px; height: 300px; border-radius: 50%;
            background: linear-gradient(135deg, var(--art-accent), #8e44ad);
            filter: blur(80px); opacity: 0.15; transition: opacity var(--transition-speed) ease;
        }

        /* Ambient Background Elements for On State */
        body.on { background-color: var(--bg-color-on); color: var(--text-color-on); }
        body.on::after {
            content: ''; position: absolute; bottom: -100px; left: -100px;
            width: 400px; height: 400px; border-radius: 50%;
            background: linear-gradient(225deg, var(--art-accent-secondary), #3ae374);
            filter: blur(100px); opacity: 0.1; transition: opacity var(--transition-speed) ease;
        }

        /* Text Styling */
        #status-container {
            margin-bottom: 50px; text-align: center; z-index: 10;
        }

        #status {
            font-size: 3.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 5px;
            background: linear-gradient(135deg, var(--art-accent), #8e44ad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all var(--transition-speed) ease;
        }
        
        body.on #status {
            background: linear-gradient(225deg, var(--art-accent-secondary), #3ae374);
            -webkit-background-clip: text;
        }

        #time { font-size: 1rem; font-weight: 300; opacity: 0.8; margin-top: 10px; }

        /* The Art Switch Container - More sculptural */
        .sculptural-switch {
            position: relative;
            width: var(--switch-width);
            height: var(--switch-height);
            background: rgba(255, 255, 255, 0.03); /* Glassmorphism */
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: calc(var(--switch-width) / 1); /* Geometric oval */
            backdrop-filter: blur(10px);
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-speed) ease;
            z-index: 5;
            display: flex;
            justify-content: center;
        }
        
        body.on .sculptural-switch {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        /* Central Groove for movement */
        .sculptural-switch::before {
            content: ''; position: absolute;
            top: 15%; bottom: 15%; left: calc(50% - 1px); width: 2px;
            background: rgba(255, 255, 255, 0.05); border-radius: 1px;
            transition: background var(--transition-speed) ease;
        }
        
        body.on .sculptural-switch::before { background: rgba(0, 0, 0, 0.05); }

        /* The Switch Handle - The Art Object */
        .art-handle {
            position: absolute;
            top: calc( (var(--switch-height) / 2) - ( (var(--switch-width) * 0.8) / 2) ); /* Central Off */
            left: calc( (100% - (var(--switch-width) * 0.8) ) / 2); /* Perfectly Centered */
            width: calc(var(--switch-width) * 0.8);
            height: calc(var(--switch-width) * 0.8);
            background: linear-gradient(145deg, #2a2a2e, #1a1a1d);
            border-radius: 50%;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.4), -10px -10px 20px rgba(255,255,255,0.03);
            transition: all var(--transition-speed) var(--easing);
            display: flex; justify-content: center; align-items: center;
        }
        
        body.on .art-handle {
            top: calc(5% + (var(--switch-height) * 0.1)); /* High Position On */
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.05), -10px -10px 20px rgba(255,255,255,0.7);
        }

        /* Abstract Icon Inside */
        .art-icon {
            width: 40%; height: 40%; border-radius: 50%;
            background: var(--art-accent);
            box-shadow: 0 0 15px var(--art-accent);
            transition: all var(--transition-speed) var(--easing);
        }
        
        body.on .art-icon {
            background: var(--art-accent-secondary);
            box-shadow: 0 0 20px var(--art-accent-secondary), 0 0 40px var(--art-accent-secondary);
            transform: scale(0.9);
        }

        /* Abstract Interaction - Geometric Expansion */
        .geometric-interaction {
            position: absolute; width: 0; height: 0; border-radius: 50%;
            background: var(--art-accent); filter: blur(5px);
            opacity: 0; pointer-events: none; transition: all 0.4s ease-out;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        
        body.on .geometric-interaction {
            width: 150%; height: 150%; opacity: 0.15;
            background: var(--art-accent-secondary);
        }

        /* Mobile Responsive adjustments */
        @media (max-width: 500px) {
            :root { --switch-width: 120px; --switch-height: 220px; }
            #status { font-size: 2.5rem; }
        }

    </style>
</head>
<body class="off">
    <div id="status-container">
        <h1 id="status">Skibidee</h1>
        <p id="time">Đang tắt</p>
    </div>

    <div class="sculptural-switch" id="art-switch">
        <div class="art-handle">
            <div class="art-icon"></div>
        </div>
        <div class="geometric-interaction"></div>
    </div>

    <script>
        const body = document.body;
        const statusText = document.getElementById('status');
        const timeText = document.getElementById('time');
        const artSwitch = document.getElementById('art-switch');

        // Hàm cập nhật giao diện
        function updateUI(state, timeStr) {
            if (state === 'on') {
                body.classList.remove('off');
                body.classList.add('on');
                timeText.innerText = `Bật lúc ${timeStr}`;
            } else {
                body.classList.remove('on');
                body.classList.add('off');
                timeText.innerText = `Tắt lúc ${timeStr}`;
            }
        }

        // Sự kiện click vào cái công tắc nghệ thuật
        artSwitch.addEventListener('click', () => {
            const newState = body.classList.contains('off') ? 'on' : 'off';
            
            // Gửi dữ liệu lên Server
            fetch('/api/log', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state: newState })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // Chuyển đổi giao diện ngay lập tức
                    updateUI(newState, data.time);
                }
            })
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
